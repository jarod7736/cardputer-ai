; PlatformIO config for Cardputer-AI firmware.
;
; M0 ran on pure Arduino + esp32-s3-devkitc-1.
; M1 switches to an arduino+espidf hybrid so we can pull in ESP-IDF
; components (esp_wireguard) alongside the existing M5Unified UI code.
;
; Hardware: ESP32-S3FN8, 8 MB flash, NO PSRAM (resolved in M0 hw report).

[env:cardputer-adv]
platform = espressif32 @ ^6.7.0
; No dedicated Cardputer-ADV profile in this PIO version; M5Unified runtime-detects
; the ADV variant (M0 confirmed board id 24 = board_M5CardputerADV).
board = esp32-s3-devkitc-1
framework = arduino, espidf

; Flash & monitor
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time

; USB-CDC on boot so Serial works over the native USB port
build_flags =
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D ARDUINO_USB_MODE=1
  -D CORE_DEBUG_LEVEL=3
  -D CONFIG_ARDUHAL_LOG_COLORS=1
  ; esp_wireguard allowed-IP slots per peer. Library default is 1, but
  ; the lib auto-fills slot 0 with the device's own /32, leaving no room
  ; for the routed CIDR (0.0.0.0/0 in full-tunnel). Bump to 8.
  ; (The library is pulled in as an Arduino lib here, not an IDF
  ; component, so sdkconfig values for it don't reach the preprocessor —
  ; we have to pass it as a build flag.)
  -D CONFIG_WIREGUARD_MAX_SRC_IPS=8
  -std=gnu++17

build_unflags =
  -std=gnu++11

; 8 MB flash, no PSRAM. Explicit partition map (see partitions.csv).
board_upload.flash_size = 8MB
board_build.flash_size = 8MB
board_build.partitions = partitions.csv

lib_deps =
  m5stack/M5Unified @ ^0.2.5
  ; Cardputer-specific bindings: keyboard, helpers. v1.1.1+ supports ADV.
  m5stack/M5Cardputer @ ^1.1.1
  ; WireGuard library selected in M1 Task 0:
  https://github.com/droscy/esp_wireguard.git#v0.4.5
  ; ICMP ping for the M1 reachability proof:
  marian-craciunescu/ESP32Ping @ ^1.7
